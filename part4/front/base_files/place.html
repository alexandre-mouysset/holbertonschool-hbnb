<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details</title>
    <link rel="preload" as="image" href="images/plage.jpg">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="./images/icon.png">
</head>

<body class="page-bg">
    <header class="header">
        <nav class="nav">
            <div class="flex justify-center sm:justify-start sm:flex-1">
                <a href="index.html">
                    <img src="images/logo.png" alt="Logo" class="logo">
                </a>
            </div>

            <div class="flex flex-wrap justify-center gap-4 sm:gap-6 sm:flex-1">
                <a href="index.html"
                    class="px-4 py-2 bg-cyan-300 border border-cyan-400 text-cyan-700 rounded-lg hover:bg-cyan-200 transition shadow-sm text-sm sm:text-base">
                    Home
                </a>
                <a href="add_review.html"
                    class="px-4 py-2 bg-cyan-300 border border-cyan-400 text-cyan-700 rounded-lg hover:bg-cyan-200 transition shadow-sm text-sm sm:text-base">
                    Review
                </a>
                <a href="my_places.html"
                    class="px-4 py-2 bg-cyan-300 border border-cyan-400 text-cyan-700 rounded-lg hover:bg-cyan-200 transition shadow-sm text-sm sm:text-base my-places-link hidden">
                    My places
                </a>
            </div>

            <div class="flex flex-col items-center sm:items-end gap-2 sm:flex-1">
                <a href="login.html" class="login-button login-link">
                    Login
                </a>
                <a href="#" class="login-button logout-link ml-3 hidden">
                    Logout
                </a>
                <p class="user-identity place-info hidden"></p>
            </div>
        </nav>
    </header>

    <main>
        <h1 class="h1">Place Details</h1>

        <div id="place-details" class="place-details">
            <!-- Place details will be populated dynamically -->
        </div>

        <div id="reviews" class="max-w-5xl mx-auto px-4">
            <!-- Reviews will be populated dynamically -->
        </div>

        <div id="review-history" class="max-w-5xl mx-auto px-4">
            <!-- Personal review history will be populated dynamically -->
        </div>

        <div class="max-w-5xl mx-auto px-4">
            <a id="add-review-link" href="add_review.html" class="details-button">Add Your Review</a>
        </div>

        <section id="add-review" class="review-card max-w-5xl mx-auto">
            <h2 class="h2-card">Add a Review</h2>
            <form id="review-form" class="mt-4 flex flex-col gap-3">
                <label for="review-text" class="place-info">Review:</label>
                <textarea id="review-text" name="review-text"
                    class="rounded-lg border border-[#ddd] bg-white/90 p-2 text-slate-800" required></textarea>

                <label for="review-rating" class="place-info">Rating:</label>
                <select id="review-rating" name="review-rating"
                    class="rounded-lg border border-[#ddd] bg-white/90 p-2 text-slate-800" required>
                    <option value="" disabled selected>Select a rating</option>
                    <option value="5">★★★★★ (5)</option>
                    <option value="4">★★★★☆ (4)</option>
                    <option value="3">★★★☆☆ (3)</option>
                    <option value="2">★★☆☆☆ (2)</option>
                    <option value="1">★☆☆☆☆ (1)</option>
                </select>

                <button type="submit" class="details-button">Submit</button>
            </form>
        </section>

        <div id="place-editor-container" class="auth-shell">
            <!-- Update place form will be populated dynamically -->
        </div>
    </main>
    <script src="scripts.js"></script>
</body>

</html>
